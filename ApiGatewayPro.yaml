spring:
  application:
    name: ApiGatewayPro
  cloud:
    gateway:
      server:
        webmvc:
            routes:
              - id: address_route
                uri: lb://address-service
                predicates:
                  - Path=/address/**

              - id: user_route
                uri: lb://user-service
                predicates:
                  - Path=/user/**

              - id: auth_route
                uri: lb://Auth-Service
                predicates:
                  - Path=/auth/**

server:
  port: 8000

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/
